  document.getElementById('q1').textContent = t.q1;
  document.getElementById('q2').textContent = t.q2;
  document.getElementById('q3').textContent = t.q3;
  document.getElementById('q4').textContent = t.q4;
  document.getElementById('iname').placeholder = t.pname;
  document.getElementById('iemail').placeholder = t.pemail;
  document.getElementById('iphone').placeholder = t.pphone;
  document.getElementById('bk2').textContent = t.back;
  document.getElementById('bk3').textContent = t.back;
  document.getElementById('bk4').textContent = t.back;
  document.getElementById('cn1').textContent = t.cont;
  document.getElementById('cn2').textContent = t.cont;
  document.getElementById('cn3').textContent = t.cont;
  document.getElementById('csend').textContent = t.send;

    var c = document.getElementById('o'+n);
    c.innerHTML = '';
    t['o'+n].forEach(function(op){
      var b = document.createElement('button');
      b.className = 'w-opt';
      b.textContent = op;
      b.onclick = function(){
        c.querySelectorAll('.w-opt').forEach(function(x){x.classList.remove('on');});
        b.classList.add('on');
      };
      c.appendChild(b);
    });
  });
}

function go(n) {
  for (var i=1;i<=4;i++){
    document.getElementById('s'+i).classList.remove('on');
    document.getElementById('b'+i).classList.remove('on');
  }
  document.getElementById('s'+n).classList.add('on');
  document.getElementById('b'+n).classList.add('on');
}

function done() {
  for (var i=1;i<=4;i++){
    document.getElementById('s'+i).classList.remove('on');
    document.getElementById('b'+i).classList.remove('on');
  }
  document.getElementById('conf').classList.add('on');
}

setLang('en', document.querySelector('.w-lang-btn.active'));
